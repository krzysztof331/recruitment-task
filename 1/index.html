<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu</title>
<style>
  :root {
    --page-padding: 40px;
    --color-fg: #000;
  }

  * {
    box-sizing: border-box;
    padding: 0;
    margin: 0;
  }

  .top-bar,
  .main-bar {
    align-items: center;
    padding: 12px var(--page-padding);
    border-bottom: 1px solid var(--color-fg);
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
  }

  .main-bar {
    display: grid;
    grid-template-columns: 1fr min(100%, 600px) 1fr;
  }

  a {
    color: var(--color-fg);
    text-decoration: none;
  }

  .top-links {
    display: flex;
    align-items: center;
    list-style: none;
  }

  .top-links a {
    text-decoration: underline;
  }

  .top-links li + li::before {
    content: "/";
    margin: 0 18px;
    color: #bdbdbd;
  }

  .logo,
  .top-tagline {
    font-weight: bold;
  }

  .search {
    display: flex;
    align-items: center;
    padding: 12px 18px;
    border: 1px solid var(--color-fg);
    border-radius: 6px;
  }

  .search input {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
  }

  .search-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    border: none;
    background: none;
    text-decoration: underline;
    cursor: pointer;
  }

  .search-btn svg,
  .action svg {
    width: 22px;
    height: 22px;
    stroke: var(--color-fg);
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .actions {
    display: flex;
    align-self: stretch;
    justify-self: end;
    margin-block: -12px;
  }

  .action {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 0 24px;
  }

  .action:first-child { padding-left: 0; }
  .action:last-child  { padding-right: 0; }

  .action + .action {
    border-left: 1px solid var(--color-fg);
  }
</style>
</head>
<body>

<div class="top-bar">
  <ul class="top-links">
    <li><a href="#">Centrum pomocy</a></li>
    <li><a href="#">Strefa wiedzy</a></li>
    <li><a href="#">Kontakt</a></li>
  </ul>
  <span class="top-tagline">Lorem ipsum</span>
</div>

<div class="main-bar">
  <div class="logo">LOGO</div>

  <form class="search" action="#">
    <input type="search" placeholder="Wpisz nazwę lub kod produktu">
    <button type="submit" class="search-btn">
      Szukaj
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
    </button>
  </form>

  <div class="actions">
    <a href="#" class="action">
      <svg viewBox="0 0 24 24">
        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      </svg>
      <span>Ulubione</span>
    </a>
    <a href="#" class="action">
      <svg viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21c0-4 4-7 8-7s8 3 8 7"/>
      </svg>
      <span>Panel</span>
    </a>
    <a href="#" class="action">
      <svg viewBox="0 0 24 24">
        <path d="M6 8h12l-1 12H7L6 8z"/>
        <path d="M9 8a3 3 0 0 1 6 0"/>
      </svg>
      <span>Koszyk</span>
    </a>
  </div>
</div>

</body>
</html>
